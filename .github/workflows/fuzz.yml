name: Fuzz

# Daily fuzz run for the cargo-fuzz harness under fuzz/. The TGA
# decoder (18-byte header -> Image-ID -> optional colour-map -> raw
# or §C.5 RLE body -> optional 26-byte TGA 2.0 footer -> 495-byte
# extension area -> postage-stamp / §C.6.8 CCT / §C.6.9 scan-line
# table / §C.7 developer-area tag directory) is the surface worth
# fuzzing; there is no external library oracle worth pulling in (and
# the clean-room wall bars libtga / image-rs's tga submodule /
# ffmpeg's targa.c anyway), so this is a decode-only panic-free
# harness: one target gets the whole 30-minute budget.

on:
  schedule:
    - cron: "31 5 * * *"   # daily 05:31 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
